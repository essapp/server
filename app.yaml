kind: Service
apiVersion: v1
metadata:
  name: h2
  labels:
    app: h2
spec:
  type: ClusterIP
  selector:
    app: h2
  ports:
    - name: tcp
      port: 8080
      protocol: TCP
      targetPort: 8080
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: h2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: h2
  template:
    metadata:
      labels:
        app: h2
        version: v1
    spec:
      containers:
      - name: h2
        image: h2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
